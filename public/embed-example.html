<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prosopopus Embed Example</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; font-family: sans-serif; }
        .container { background: white; padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 800px; }
        h1 { font-size: 1.2rem; margin-bottom: 20px; color: #333; }
        p { font-size: 0.9rem; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Iframe Embed Test</h1>
        
        <!-- Prosopopus Player Instance -->
        <iframe 
            src="/embed.html?url=/project-example.json" 
            width="100%" 
            height="100%" 
            style="border: none; aspect-ratio: 1/1; max-width: 100%;" 
            allow="pointer-lock;" 
            scrolling="no"
        ></iframe>

        <p>This is an example of the iframe embed method.</p>
    </div>
</body>
</html>
