<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prosopopus Player</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #prosopopus-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            /* Aspect ratio will be set via JS */
        }
    </style>
</head>
<body>
    <div id="prosopopus-container">
        <canvas id="prosopopus-canvas"></canvas>
    </div>

    <script type="module">
        import { ProsopopusPlayer } from './prosopopus-player.js';
        
        async function init() {
            const canvas = document.getElementById('prosopopus-canvas');
            const container = document.getElementById('prosopopus-container');
            
            // Get URL from query parameters
            const urlParams = new URLSearchParams(window.location.search);
            const projectUrl = urlParams.get('url');
            
            if (!projectUrl) {
                console.error("No project URL provided in query parameters (?url=...)");
                return;
            }

            try {
                const response = await fetch(projectUrl);
                if (!response.ok) throw new Error('Failed to fetch project JSON');
                
                const project = await response.json();
                
                // Set aspect ratio if available
                if (project.canvasSize) {
                    canvas.style.aspectRatio = `${project.canvasSize.width} / ${project.canvasSize.height}`;
                }
                
                const player = new ProsopopusPlayer(canvas, project);
                player.start();
            } catch (e) {
                console.error("Prosopopus Embed Error:", e);
            }
        }
        
        init();
    </script>
</body>
</html>
